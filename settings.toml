# Default settings — do not edit this file directly.
# To override values locally, create settings.local.toml in the same directory.
# Example settings.local.toml:
#
#   [default]
#   SQLALCHEMY_DATABASE_URI = "sqlite:////home/user/neteye.db"
#   NETMIKO_CONN_TIMEOUT = 10
#
# settings.local.toml is gitignored and will never be overwritten by git pull.

[default]
DEBUG = false

LOG_LEVEL = 'INFO'

# Server Setting
HOST = '0.0.0.0'
PORT = 5001

# Database Setting
SQLALCHEMY_DATABASE_URI = 'sqlite:////var/tmp/neteye.db'
SQLALCHEMY_TRACK_MODIFICATIONS = false

# Flask-Security Setting
SECURITY_REGISTERABLE = false
SECURITY_SEND_REGISTER_EMAIL = false
SECURITY_LOGIN_USER_TEMPLATE = 'login.html'
SECURITY_REGISTER_USER_TEMPLATE = 'register.html'
# Flask-Security-Too 5.x manages CSRF internally; disable Flask-WTF's default check
WTF_CSRF_CHECK_DEFAULT = false
# Token authentication for REST API / automation clients
# Header: Authentication-Token: <token>
SECURITY_TOKEN_AUTHENTICATION_HEADER = 'Authentication-Token'
# Token expiry: 7 days (604800 seconds)
# On expiry, client should re-login to obtain a new token
SECURITY_TOKEN_MAX_AGE = 604800

# Administrator Setting
ADMIN_EMAIL = 'neteye_admin@yourcompany.com'
ADMIN_USERNAME = 'neteye_admin'

# Ntc-templates Setting
# NOTE: Use an absolute path. Leave empty to disable custom templates.
CUSTOM_TEMPLATES_DIR = ''

# Device Connection Setting
NETMIKO_READ_TIMEOUT = 10
NETMIKO_CONN_TIMEOUT = 5
NETMIKO_AUTH_TIMEOUT = 5
NETMIKO_BANNER_TIMEOUT = 5
NETMIKO_KEEPALIVE = 5
SCRAPLI_TIMEOUT_SOCKET = 5
SCRAPLI_TIMEOUT_TRANSPORT = 5
SCRAPLI_TIMEOUT_OPS = 5
NAPALM_TIMEOUT = 5

# Ping Settings
# Upper limits for ping form fields. Override in settings.local.toml if needed.
PING_MAX_COUNT     = 10000
PING_MAX_TIMEOUT   = 100
PING_MAX_DATA_SIZE = 1500

# Traceroute Settings
# Upper limits for traceroute form fields. Override in settings.local.toml if needed.
TRACEROUTE_MAX_TTL     = 255
TRACEROUTE_MAX_TIMEOUT = 100

# History Settings
# Maximum number of history records to keep in database for each type
# NOTE: Set to 0 for unlimited records
COMMAND_HISTORY_MAX_RECORDS = 10000
NODE_HISTORY_MAX_RECORDS = 0
INTERFACE_HISTORY_MAX_RECORDS = 0
SERIAL_HISTORY_MAX_RECORDS = 0
CABLE_HISTORY_MAX_RECORDS = 0
ARP_ENTRY_HISTORY_MAX_RECORDS = 50000

# Specify device types for netmiko autodetect
# NOTE: If empty or parameter does not exist, all device types will be targeted.
AUTO_DETECT_DEVICE_TYPES = [
    "cisco_ios",
    "cisco_xe",
    "cisco_nxos",
    "cisco_xr",
    "cisco_asa",
    "arista_eos",
    "juniper_junos",
    "fortinet",
    "paloalto_panos"
]

[development]
DEBUG = true
LOG_LEVEL = 'DEBUG'

[production]
LOG_LEVEL = 'INFO'

[testing]
SQLALCHEMY_DATABASE_URI = "sqlite:////tmp/neteye_test.db"
WTF_CSRF_ENABLED = false
SECURITY_CSRF_PROTECT_MECHANISMS = []
SECRET_KEY = "test-secret-key"
SECURITY_PASSWORD_SALT = "test-salt"
NODE_CREDENTIAL_KEY = "test-node-credential-key"
ADMIN_PASSWORD = "Test-Admin-Pass-1!"
